<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#06B6D4" opacity="0.1" stroke="#06B6D4" stroke-width="2"/>
  
  <!-- Compass circle -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="#06B6D4" stroke-width="2"/>
  
  <!-- Compass points -->
  <line x1="64" y1="20" x2="64" y2="35" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="108" y1="64" x2="93" y2="64" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="108" x2="64" y2="93" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="64" x2="35" y2="64" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Center circle with graduation cap -->
  <circle cx="64" cy="64" r="28" fill="#06B6D4"/>
  
  <!-- Graduation cap (mortarboard) -->
  <g transform="translate(64, 56)">
    <!-- Cap platform -->
    <rect x="-12" y="0" width="24" height="3" fill="white" rx="1"/>
    <!-- Cap square -->
    <rect x="-14" y="-8" width="28" height="8" fill="white" rx="1"/>
    <!-- Tassel -->
    <line x1="14" y1="-8" x2="20" y2="2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="20" cy="4" r="1.5" fill="white"/>
  </g>
  
  <!-- Accent elements -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.3"/>
</svg>